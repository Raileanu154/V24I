<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prețuri - BrainPower</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
        }

        /* BARA DE MENIU ALBASTRĂ */
        .navbar {
            background-color: #0066ff !important;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.5rem;
        }

        .nav-link-menu {
            color: rgba(255, 255, 255, 0.75) !important;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-link-menu:hover, .nav-link-menu.active {
            color: #ffffff !important;
        }

        /* CARDUL CALCULATORULUI */
        .calculator-card {
            background: #ffffff;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            max-width: 500px;
            margin: 0 auto;
        }

        .form-label {
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
        }

        .btn-calc {
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s ease;
        }

        .btn-calc:hover {
            background: #0d47a1;
        }

        /* REZULTAT */
        #total {
            color: #1e293b;
            font-weight: 700;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">BrainPower</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Acasă</a></li>
                <li class="nav-item"><a class="nav-link" href="subjects.html">Materii</a></li>
                <li class="nav-item"><a class="nav-link" href="teachers.html">Profesori</a></li>
                <li class="nav-item"><a class="nav-link" href="schedule.html">Orar</a></li>
                <li class="nav-item"><a class="nav-link active" href="prices.html">Prețuri</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold" style="color: #1e293b;">Calculator Cost Lunar</h1>
        <p class="text-muted">Estimează-ți bugetul simplu și rapid în funcție de numărul de ședințe dorite</p>
    </div>

    <div class="card calculator-card p-4 p-md-5">
        <div class="mb-3">
            <label class="form-label">Număr ședințe pe lună</label>
            <input type="number" id="sedinte" class="form-control" placeholder="Ex: 8">
        </div>

        <div class="mb-4">
            <label class="form-label">Preț per ședință (€)</label>
            <input type="number" id="pret" class="form-control" placeholder="Ex: 20">
        </div>

        <button onclick="calculate()" class="btn btn-calc mb-3">
            Calculează Cost Total
        </button>

        <h3 id="total" class="mt-3" style="display: none;"></h3>
    </div>

</div>

<script src="js/calculator.js"></script>
<script>
    const originalCalculate = window.calculate;
    window.calculate = function() {
        if(typeof originalCalculate === 'function') originalCalculate();
        document.getElementById('total').style.display = 'block';
    }
</script>

</body>
</html>
